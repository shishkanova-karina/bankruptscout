services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: scraper
      POSTGRES_PASSWORD: scraper
      POSTGRES_DB: scraper
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scraper -d scraper"]
      interval: 5s
      timeout: 5s
      retries: 5

  scraper:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg2://scraper:scraper@db:5432/scraper
      INPUT_XLSX: ${INPUT_XLSX:-/data/sample_inns.xlsx}
      ROBOTSTXT_OBEY: ${ROBOTSTXT_OBEY:-false}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DOWNLOAD_DELAY: ${DOWNLOAD_DELAY:-2.0}
      CONCURRENT_REQUESTS: ${CONCURRENT_REQUESTS:-2}
      SCRAPY_JOBDIR: ${SCRAPY_JOBDIR:-/app/data/scrapy-job}
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./input:/data:ro

volumes:
  pgdata:
